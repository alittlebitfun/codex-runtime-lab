<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codex Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg-deep: #09090b;
  --bg-panel: #111113;
  --bg-card: #18181b;
  --bg-hover: #1f1f23;
  --bg-input: #0c0c0e;
  --border: #27272a;
  --border-accent: #3f3f46;
  --text: #fafafa;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green: #22c55e;
  --green-dim: #166534;
  --yellow: #eab308;
  --yellow-dim: #854d0e;
  --red: #ef4444;
  --red-dim: #991b1b;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --code-bg: #0d0d10;
  --shadow: 0 1px 3px rgba(0,0,0,0.4);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --font: 'Inter', -apple-system, 'PingFang SC', 'Segoe UI', sans-serif;
  --mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  --sidebar-w: 280px;
  --right-w: 420px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: var(--font); color: var(--text); background: var(--bg-deep); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }
input, textarea, button { font-family: inherit; }

/* ====== AUTH ====== */
.auth-page { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-deep); }
.auth-card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 400px; max-width: 92vw; }
.auth-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
.auth-card .subtitle { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }
.auth-field { margin-bottom: 16px; }
.auth-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.auth-field input { width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; outline: none; transition: border-color 0.15s; }
.auth-field input:focus { border-color: var(--accent); }
.auth-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
.auth-btn:hover { background: var(--accent-hover); }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-toggle { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
.auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
.auth-toggle a:hover { text-decoration: underline; }
.auth-error { background: var(--red-dim); color: var(--red); padding: 8px 12px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }

/* ====== APP LAYOUT ====== */
.app-layout { display: flex; height: 100vh; }
.sidebar { width: var(--sidebar-w); min-width: 200px; max-width: 450px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.main-area { flex: 1; display: flex; min-width: 0; }
.chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.right-panel { width: var(--right-w); min-width: 240px; max-width: 700px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }

/* ====== RESIZE HANDLES ====== */
.resize-handle { width: 5px; cursor: col-resize; background: transparent; transition: background 0.15s; flex-shrink: 0; position: relative; z-index: 10; }
.resize-handle:hover, .resize-handle.active { background: var(--accent); }
.resize-handle::after { content: ''; position: absolute; top: 0; bottom: 0; left: -3px; right: -3px; }

/* ====== SIDEBAR ====== */
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.sidebar-logo svg { width: 28px; height: 28px; }
.sidebar-logo h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-logo span { font-size: 11px; color: var(--text-muted); background: var(--bg-card); padding: 2px 8px; border-radius: 20px; }
.new-session-btn { width: 100%; padding: 10px 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
.new-session-btn:hover { background: var(--accent-hover); }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-goto { padding: 8px; border-top: 1px solid var(--border); position: relative; }
.session-goto input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 6px 28px 6px 8px; font-size: 12px; outline: none; }
.session-goto input:focus { border-color: var(--border-accent); }
.session-goto .clear-filter { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 4px; line-height: 1; display: none; }
.session-goto .clear-filter.visible { display: block; }
.session-goto .clear-filter:hover { color: var(--text); }
.session-item { padding: 10px 12px; border-radius: var(--radius); cursor: pointer; margin-bottom: 4px; transition: all 0.12s; border: 1px solid transparent; position: relative; }
.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--bg-card); border-color: var(--accent); }
.session-item .name { font-size: 13px; font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
.session-item .meta { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
.session-item .menu-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); opacity: 0; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 16px; line-height: 1; letter-spacing: 1px; }
.session-item:hover .menu-btn { opacity: 1; }
.session-item .menu-btn:hover { color: var(--text); background: var(--bg-card); }
.session-item .pin-indicator { color: var(--accent); font-size: 10px; flex-shrink: 0; }
.session-item.dragging { opacity: 0.4; }
.session-item.drag-over { border-top: 2px solid var(--accent); margin-top: -2px; }
.session-item .rename-input { background: var(--bg-input); border: 1px solid var(--accent); color: var(--text); border-radius: 3px; padding: 1px 4px; font-size: 13px; font-weight: 600; outline: none; width: 100%; }

/* Section headers */
.section-header { padding: 8px 12px 4px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; user-select: none; }
.section-header .section-count { font-size: 10px; background: var(--bg-card); padding: 1px 6px; border-radius: 10px; font-weight: 400; }
.section-header.drop-target { color: var(--accent); background: rgba(59,130,246,0.05); border-radius: var(--radius-sm); }

/* Collection sections */
.collection-section { margin-bottom: 2px; }
.collection-header { padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 6px; border-radius: var(--radius-sm); margin: 0 4px; user-select: none; transition: background 0.1s; }
.collection-header:hover { background: var(--bg-hover); }
.collection-header .chevron { font-size: 9px; width: 12px; transition: transform 0.15s; color: var(--text-muted); flex-shrink: 0; }
.collection-header .chevron.expanded { transform: rotate(90deg); }
.collection-header .coll-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.collection-header .coll-name-input { background: var(--bg-input); border: 1px solid var(--accent); color: var(--text); border-radius: 3px; padding: 1px 4px; font-size: 12px; font-weight: 600; outline: none; flex: 1; min-width: 0; }
.collection-header .coll-menu-btn { opacity: 0; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 4px; border-radius: 3px; font-size: 14px; line-height: 1; letter-spacing: 1px; flex-shrink: 0; }
.collection-header:hover .coll-menu-btn { opacity: 1; }
.collection-header .coll-menu-btn:hover { color: var(--text); background: var(--bg-card); }
.collection-header .coll-count { font-size: 10px; color: var(--text-muted); font-weight: 400; }
.collection-header.drop-target { background: rgba(59,130,246,0.1); border: 1px dashed var(--accent); }
.collection-body { padding-left: 8px; }

/* Context menu */
.context-menu-backdrop { position: fixed; inset: 0; z-index: 999; }
.context-menu { position: fixed; z-index: 1000; background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 180px; padding: 4px; animation: msgIn 0.12s ease-out; }
.context-menu-item { padding: 8px 12px; font-size: 13px; cursor: pointer; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 8px; color: var(--text); white-space: nowrap; }
.context-menu-item:hover { background: var(--bg-hover); }
.context-menu-item.danger { color: var(--red); }
.context-menu-item.danger:hover { background: var(--red-dim); }
.context-menu-item .shortcut { margin-left: auto; font-size: 11px; color: var(--text-muted); }
.context-menu-item.submenu-trigger { position: relative; }
.context-menu-item.submenu-trigger::after { content: '▸'; margin-left: auto; font-size: 11px; color: var(--text-muted); }
.context-menu-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* Create collection button */
.create-collection-btn { width: calc(100% - 8px); margin: 4px; padding: 6px 12px; background: none; border: 1px dashed var(--border); color: var(--text-muted); border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; justify-content: center; transition: all 0.15s; }
.create-collection-btn:hover { border-color: var(--accent); color: var(--accent); }

/* User bar at bottom of sidebar */
.user-bar { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.user-bar .user-avatar { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
.user-bar .user-info { flex: 1; min-width: 0; }
.user-bar .user-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-bar .user-email { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.user-bar .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 12px; }
.user-bar .logout-btn:hover { color: var(--red); }

/* Status dot */
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot.idle { background: var(--green); }
.dot.busy { background: var(--yellow); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

/* Concurrency bar */
.concurrency-bar { padding: 12px 16px; border-top: 1px solid var(--border); }
.concurrency-bar .label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
.concurrency-track { height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; }
.concurrency-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }

/* ====== CHAT ====== */
.chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg-panel); }
.chat-header .title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.chat-header .model-badge { font-size: 11px; color: var(--text-muted); background: var(--bg-card); padding: 3px 10px; border-radius: 20px; font-family: var(--mono); }

.chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
.message { margin-bottom: 16px; display: flex; gap: 12px; max-width: 100%; animation: msgIn 0.25s ease-out; }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.message .avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.message.user .avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.message.assistant .avatar { background: linear-gradient(135deg, #059669, #10b981); }
.message .bubble { flex: 1; min-width: 0; }
.message .bubble-header { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
.message .bubble-content { font-size: 14px; line-height: 1.65; color: var(--text); word-break: break-word; }
.message .bubble-content p { margin-bottom: 8px; }
.message .bubble-content p:last-child { margin-bottom: 0; }

/* Code blocks in messages */
.code-block-wrap { margin: 8px 0; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.code-block-header { background: #1a1a1f; padding: 6px 12px; font-size: 11px; color: var(--text-muted); font-family: var(--mono); display: flex; justify-content: space-between; align-items: center; }
.code-block-header .copy-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
.code-block-header .copy-btn:hover { color: var(--text); background: var(--bg-hover); }
pre.code-block { background: var(--code-bg); padding: 12px 14px; margin: 0; overflow-x: auto; font-family: var(--mono); font-size: 13px; line-height: 1.55; color: #d4d4d8; }
code.inline { background: var(--bg-card); padding: 2px 6px; border-radius: 4px; font-family: var(--mono); font-size: 12px; color: #f472b6; }

/* Chat input */
.chat-input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-panel); }
.chat-input-wrap { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.15s; }
.chat-input-wrap:focus-within { border-color: var(--accent); }
.chat-input-wrap textarea { width: 100%; background: transparent; border: none; color: var(--text); padding: 12px 16px; font-size: 14px; resize: none; outline: none; min-height: 52px; max-height: 160px; line-height: 1.5; }
.chat-input-wrap textarea::placeholder { color: var(--text-muted); }
.chat-input-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; }
.chat-input-toolbar .hints { font-size: 11px; color: var(--text-muted); }
.chat-input-toolbar .actions { display: flex; gap: 6px; }
.send-btn { padding: 7px 16px; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.send-btn.primary { background: var(--accent); color: white; }
.send-btn.primary:hover { background: var(--accent-hover); }
.send-btn.secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
.send-btn.secondary:hover { background: var(--bg-hover); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Model selector chip */
.model-select-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px; font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-family: var(--mono); white-space: nowrap; position: relative; }
.model-select-chip:hover { border-color: var(--border-accent); background: var(--bg-hover); }
.model-select-chip select { appearance: none; background: transparent; border: none; color: var(--text-secondary); font-size: 12px; font-family: var(--mono); cursor: pointer; outline: none; padding-right: 14px; }
.model-select-chip::after { content: '\25BC'; position: absolute; right: 10px; font-size: 10px; color: var(--text-muted); pointer-events: none; }

/* Circular send button */
.send-circle { width: 34px; height: 34px; border-radius: 50%; background: var(--text); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.send-circle:hover { transform: scale(1.08); }
.send-circle:disabled { background: var(--border); cursor: not-allowed; transform: none; }
.send-circle svg { width: 16px; height: 16px; }
.upload-btn { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 12px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
.upload-btn:hover { background: var(--bg-hover); border-color: var(--border-accent); }

/* ====== RIGHT PANEL ====== */
.panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
.panel-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-muted); transition: all 0.12s; background: none; border-top: none; border-left: none; border-right: none; }
.panel-tab:hover { color: var(--text-secondary); }
.panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.panel-content { flex: 1; overflow-y: auto; position: relative; }

/* File tree */
.file-tree { padding: 8px; }
.file-tree-header { padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.file-tree-item { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; transition: background 0.1s; }
.file-tree-item:hover { background: var(--bg-hover); }
.file-tree-item.active { background: var(--bg-card); }
.file-tree-item .icon { font-size: 14px; width: 18px; text-align: center; }
.file-tree-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-tree-item .fsize { font-size: 11px; color: var(--text-muted); }
.file-tree-item.dir .fname { color: var(--cyan); }
.file-tree-item .ref-btn { opacity: 0; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; padding: 2px 4px; border-radius: 3px; flex-shrink: 0; transition: opacity 0.1s, color 0.1s; }
.file-tree-item:hover .ref-btn { opacity: 1; }
.file-tree-item .ref-btn:hover { color: var(--accent); background: rgba(59,130,246,0.1); }
.file-ref-chip { display: inline-flex; align-items: center; gap: 4px; background: rgba(59,130,246,0.12); color: var(--accent); border-radius: 4px; padding: 1px 6px; font-size: 12px; font-family: var(--mono); margin-right: 4px; vertical-align: middle; }
.file-grid-item .ref-btn { position: absolute; top: 4px; right: 4px; opacity: 0; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; font-size: 11px; padding: 2px 5px; border-radius: 4px; transition: opacity 0.1s, color 0.1s; }
.file-grid-item:hover .ref-btn { opacity: 1; }
.file-grid-item .ref-btn:hover { color: var(--accent); border-color: var(--accent); }
.file-grid-item { position: relative; }
.file-tree-empty { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }

/* Upload dropzone */
.dropzone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; text-align: center; margin: 8px; color: var(--text-muted); font-size: 13px; transition: all 0.15s; cursor: pointer; }
.dropzone:hover, .dropzone.dragover { border-color: var(--accent); background: rgba(59,130,246,0.05); color: var(--accent); }

/* Pending uploads in chat input */
.pending-uploads { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 0; }
.file-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px 4px 6px; font-size: 12px; color: var(--text-secondary); animation: msgIn 0.2s ease-out; }
.file-chip .chip-icon { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
.file-chip .chip-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-chip .chip-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0 2px; font-size: 14px; line-height: 1; }
.file-chip .chip-remove:hover { color: var(--red); }

/* File grid view */
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; padding: 8px; }
.file-grid-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border-radius: var(--radius); cursor: pointer; transition: background 0.1s; border: 1px solid transparent; }
.file-grid-item:hover { background: var(--bg-hover); }
.file-grid-item.active { background: var(--bg-card); border-color: var(--accent); }
.file-grid-item .grid-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--bg-input); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--text-muted); overflow: hidden; }
.file-grid-item .grid-thumb img { width: 100%; height: 100%; object-fit: cover; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

/* ====== API HELPERS ====== */
let authToken = sessionStorage.getItem('codex_token') || '';

function setAuth(token) {
  authToken = token;
  if (token) sessionStorage.setItem('codex_token', token);
  else sessionStorage.removeItem('codex_token');
}

async function api(path, opts = {}) {
  const headers = { 'content-type': 'application/json' };
  if (authToken) headers['authorization'] = `Bearer ${authToken}`;
  const res = await fetch(path, { ...opts, headers: { ...headers, ...(opts.headers || {}) } });
  if (res.status === 401) {
    setAuth('');
    window.location.reload();
    throw new Error('登录已过期');
  }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `Request failed ${res.status}`);
  return data;
}

async function apiUpload(path, formData) {
  const headers = {};
  if (authToken) headers['authorization'] = `Bearer ${authToken}`;
  const res = await fetch(path, { method: 'POST', headers, body: formData });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `Upload failed ${res.status}`);
  return data;
}

function getSessionIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('session') || params.get('sid') || '';
}

function setSessionIdToUrl(sessionId) {
  const url = new URL(window.location.href);
  if (sessionId) {
    url.searchParams.set('session', sessionId);
  } else {
    url.searchParams.delete('session');
  }
  url.searchParams.delete('sid');
  window.history.replaceState({}, '', `${url.pathname}${url.search}`);
}

/* ====== MARKDOWN LITE ====== */
function renderMd(text) {
  if (!text) return '';
  const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let result = escaped.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const langLabel = lang || 'code';
    return `<div class="code-block-wrap"><div class="code-block-header"><span>${langLabel}</span><button class="copy-btn" onclick="navigator.clipboard.writeText(this.closest('.code-block-wrap').querySelector('pre').textContent)">Copy</button></div><pre class="code-block">${code}</pre></div>`;
  });
  result = result.replace(/`([^`]+)`/g, '<code class="inline">$1</code>');
  result = result.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  result = result.replace(/\*(.+?)\*/g, '<em>$1</em>');
  result = result.split('\n\n').map(p => {
    if (p.includes('code-block-wrap')) return p;
    return `<p>${p.replace(/\n/g, '<br/>')}</p>`;
  }).join('');
  return result;
}

/* ====== AUTH PAGE ====== */
function AuthPage({ onLogin, onBack }) {
  const [mode, setMode] = useState('login'); // login | register
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
      const body = mode === 'login' ? { email, password } : { email, password, display_name: name };
      const data = await api(endpoint, { method: 'POST', body: JSON.stringify(body) });
      setAuth(data.token);
      onLogin(data.user);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }

  return (
    <div className="auth-page">
      <form className="auth-card" onSubmit={handleSubmit}>
        {onBack && <button type="button" onClick={onBack} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'18px',marginBottom:'12px',padding:'4px'}}>← 返回</button>}
        <h1>{mode === 'login' ? '欢迎回来' : '创建账号'}</h1>
        <p className="subtitle">{mode === 'login' ? '登录 Codex Lab 继续使用' : '注册以开始使用 Codex Lab'}</p>

        {error && <div className="auth-error">{error}</div>}

        <div className="auth-field">
          <label>邮箱</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" required />
        </div>

        {mode === 'register' && (

        <button className="auth-btn" type="submit" disabled={loading}>
          {loading ? <span className="spinner"></span> : (mode === 'login' ? '登录' : '注册')}
        </button>

        <div className="auth-toggle">
          {mode === 'login' ? (
            <>还没有账号？<a onClick={() => { setMode('register'); setError(''); }}>立即注册</a></>

  );
}

/* ====== RESIZE HOOK ====== */
function useResize(initialWidth, minW, maxW) {
  const [width, setWidth] = useState(initialWidth);
  const dragging = useRef(false);

  const onMouseDown = useCallback((e) => {
    e.preventDefault();
    dragging.current = true;
    const startX = e.clientX;
    const startW = width;

    function onMove(ev) {
      if (!dragging.current) return;
      const delta = ev.clientX - startX;
      setWidth(Math.min(maxW, Math.max(minW, startW + delta)));
    }
    function onUp() {
      dragging.current = false;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }

    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }, [width, minW, maxW]);

  return { width, onMouseDown };
}

/* For right panel, drag left = wider */
function useResizeRight(initialWidth, minW, maxW) {
  const [width, setWidth] = useState(initialWidth);
  const dragging = useRef(false);

  const onMouseDown = useCallback((e) => {
    e.preventDefault();
    dragging.current = true;
    const startX = e.clientX;
    const startW = width;

    function onMove(ev) {
      if (!dragging.current) return;
      const delta = startX - ev.clientX; // reversed
      setWidth(Math.min(maxW, Math.max(minW, startW + delta)));
    }
    function onUp() {
      dragging.current = false;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }

    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }, [width, minW, maxW]);

  return { width, onMouseDown };
}

/* ====== CONTEXT MENU ====== */
function ContextMenu({ x, y, sessionId, sessionPinned, collections, onClose, onPin, onMoveToCollection, onRename, onDelete, onCreateCollection, onExport }) {
  const menuRef = useRef(null);
  const [showSubmenu, setShowSubmenu] = useState(false);
  const [submenuPos, setSubmenuPos] = useState({ x: 0, y: 0 });

  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [onClose]);

  useEffect(() => {
    if (menuRef.current) {
      const rect = menuRef.current.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      let nx = x, ny = y;
      if (nx + rect.width > vw - 8) nx = vw - rect.width - 8;
      if (ny + rect.height > vh - 8) ny = vh - rect.height - 8;
      if (nx !== x || ny !== y) {
        menuRef.current.style.left = nx + 'px';
        menuRef.current.style.top = ny + 'px';
      }
    }
  }, [x, y]);

  const handleSubmenuEnter = () => {
    setShowSubmenu(true);
    if (menuRef.current) {
      const trigger = menuRef.current.querySelector('.submenu-trigger');
      if (trigger) {
        const rect = trigger.getBoundingClientRect();
        const menuRect = menuRef.current.getBoundingClientRect();
        const vw = window.innerWidth;
        let sx = rect.right + 4;
        if (sx + 180 > vw) sx = rect.left - 184;
        setSubmenuPos({ x: sx, y: rect.top });
      }
    }
  };

  return (
    <>
      <div className="context-menu-backdrop" onClick={onClose} onContextMenu={e => { e.preventDefault(); onClose(); }} />
      <div className="context-menu" ref={menuRef} style={{ left: x, top: y }}>
        <div className="context-menu-item" onClick={() => { onRename(sessionId); onClose(); }}>
          <span>✏️</span><span>重命名</span>
        </div>
        <div className="context-menu-item" onClick={() => { onPin(sessionId); onClose(); }}>
          <span>{sessionPinned ? '📌' : '⭐'}</span>
          <span>{sessionPinned ? '取消置顶' : '置顶'}</span>
        </div>
        <div className="context-menu-item submenu-trigger" onMouseEnter={handleSubmenuEnter} onMouseLeave={() => setShowSubmenu(false)}>
          <span>📁</span>
          <span>分组</span>
        </div>
        {showSubmenu && (
          <div className="context-menu" style={{ left: submenuPos.x, top: submenuPos.y }}>
            <div className="context-menu-item" onClick={() => { onMoveToCollection(sessionId, null); onClose(); }}>
              <span>无分组</span>
            </div>
            <div className="context-menu-divider" />
            {collections.map(c => (
              <div key={c.id} className="context-menu-item" onClick={() => { onMoveToCollection(sessionId, c.id); onClose(); }}>
                <span>📁</span><span>{c.name}</span>
              </div>
            ))}
            {collections.length > 0 && <div className="context-menu-divider" />}
            <div className="context-menu-item" onClick={() => { onCreateCollection(sessionId); onClose(); }}>
              <span>➕</span><span>新建集合...</span>
            </div>
          </div>
        )}
        <div className="context-menu-divider" />
        <div className="context-menu-item" onClick={() => { onExport(sessionId); onClose(); }}>
          <span>📥</span><span>导出对话记录</span>
        </div>
        <div className="context-menu-divider" />
        <div className="context-menu-item danger" onClick={() => { onDelete(sessionId); onClose(); }}>
          <span>📦</span><span>归档</span>
        </div>
      </div>
    </>

    <div className="concurrency-bar">

        <span>{active} / {max}</span>

      <div className="concurrency-track">
        <div className="concurrency-fill" style={{ width: `${Math.min(pct, 100)}%`, background: color }}></div>
      </div>
    </div>
  );
}

/* ====== MAIN APP ====== */
function MainApp({ user, onLogout }) {
  const [sessions, setSessions] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [config, setConfig] = useState({ defaultModel: 'gpt-5.3-codex-spark', models: ['gpt-5.3-codex-spark', 'gpt-5.5'], maxConcurrentSessions: 1 });
