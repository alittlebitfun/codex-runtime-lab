  const [selectedFile, setSelectedFile] = useState(null);
  const [fileContent, setFileContent] = useState('');
  const [previewPath, setPreviewPath] = useState('');
  const [toast, setToast] = useState(null);
  const [sending, setSending] = useState(false);
  const [isProcessing, setIsProcessing] = useState(false);
  const [activeProcessors, setActiveProcessors] = useState(0);
  const [dropActive, setDropActive] = useState(false);
  const [pendingUploads, setPendingUploads] = useState([]); // File objects staged in chat input
  const [fileViewMode, setFileViewMode] = useState('list'); // list | grid
  const [currentModel, setCurrentModel] = useState('gpt-5.3-codex-spark');
  const [sessionSearchValue, setSessionSearchValue] = useState('');
  const [collections, setCollections] = useState([]);
  const [collapsedCollections, setCollapsedCollections] = useState(new Set());
  const [contextMenu, setContextMenu] = useState(null);
  const [renamingSessionId, setRenamingSessionId] = useState(null);
  const [renameValue, setRenameValue] = useState('');
  const [dragOverTarget, setDragOverTarget] = useState(null);
  const [draggingSessionId, setDraggingSessionId] = useState(null);
  const [renamingCollectionId, setRenamingCollectionId] = useState(null);
  const [collectionRenameValue, setCollectionRenameValue] = useState('');
  const [streamingContent, setStreamingContent] = useState('');
  const [isStreaming, setIsStreaming] = useState(false);
  const streamSourceRef = useRef(null);
  const dragRef = useRef({ isDragging: false, draggedId: null });
  const suppressPollRef = useRef(false);
  const initialLoadRef = useRef(true);

  const MODEL_OPTIONS = config.models?.length ? config.models : ['gpt-5.3-codex-spark', 'gpt-5.5'];

  // File type detection
  const IMAGE_EXT = /\.(png|jpe?g|gif|webp|svg|bmp|ico)$/i;
  const VIDEO_EXT = /\.(mp4|webm|ogg|mov|avi|mkv|m4v)$/i;
  const TEXT_EXT = /\.(txt|md|markdown|log|csv|json|yaml|yml|toml|xml|ini|cfg|conf|env|sh|bat|py|js|ts|jsx|tsx|html|htm|css|scss|sql|go|rs|java|c|cpp|h|hpp|rb|php|swift|kt)$/i;
  const getFileDisplayName = (item) => item?.displayName || item?.name || '';
  const isImage = (name) => IMAGE_EXT.test(name || '');
  const isVideo = (name) => VIDEO_EXT.test(name || '');
  const isText = (name) => TEXT_EXT.test(name || '');
  const isHtml = (name) => /\.(html|htm)$/i.test(name || '');
  const isHyperframe = (name) => /\.hf\.html$/i.test(name || '') || /\.hyperframe$/i.test(name || '');
  const MODEL_3D_EXT = /\.(stl|obj|gltf|glb|ply)$/i;
  const is3D = (name) => MODEL_3D_EXT.test(name || '');
  const isPreviewable = (name) => isImage(name) || isText(name) || isHtml(name) || is3D(name) || isVideo(name) || isHyperframe(name);

  const chatEndRef = useRef(null);
  const chatContainerRef = useRef(null);
  const textareaRef = useRef(null);
  const pollRef = useRef(null);
  const fileInputRef = useRef(null);
  const [userScrolledUp, setUserScrolledUp] = useState(false);
  const prevMsgCountRef = useRef(0);

  const leftResize = useResize(280, 200, 450);
  const rightResize = useResizeRight(420, 240, 700);

  const activeSession = sessions.find(s => s.id === activeId);

  // Detect if user scrolled up
  function handleChatScroll(e) {
    const el = e.target;
    if (!el) return;
    const distanceFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
    setUserScrolledUp(distanceFromBottom > 80);
  }

  // Auto-scroll to bottom when new messages arrive (only if user hasn't scrolled up)
  useLayoutEffect(() => {
    const count = messages.length;
    const hasNewMessages = count > prevMsgCountRef.current;
    prevMsgCountRef.current = count;

    if (!hasNewMessages && count > 0) return;
    if (userScrolledUp) return;

    const el = chatEndRef.current;
    if (!el) return;

    // Use rAF to ensure DOM is painted before scrolling
    requestAnimationFrame(() => {
      el.scrollIntoView({ behavior: 'auto', block: 'end' });
      // Double-check after a frame in case content is still rendering
      requestAnimationFrame(() => {
        el.scrollIntoView({ behavior: 'auto', block: 'end' });
      });
    });
  }, [messages]);

  // Force scroll when session changes
  useEffect(() => {
    prevMsgCountRef.current = 0;
    setUserScrolledUp(false);
    const el = chatEndRef.current;
    if (el) {
      requestAnimationFrame(() => el.scrollIntoView({ behavior: 'auto', block: 'end' }));
    }
  }, [activeId]);

  function scrollToBottom() {
    const el = chatEndRef.current;
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      setUserScrolledUp(false);
    }
  }

  // Auto-resize textarea
  useEffect(() => {
    const ta = textareaRef.current;
    if (ta) { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 160) + 'px'; }
  }, [inputValue]);

  // Init
  useEffect(() => {
    (async () => {
      try {
        const cfg = await api('/api/config');
        setConfig(cfg);
        if (cfg.defaultModel) setCurrentModel(cfg.defaultModel);
      } catch {}
      await refreshSessions();
      await loadCollections();
    })();
  }, []);

  // Polling
  useEffect(() => {
    if (pollRef.current) clearInterval(pollRef.current);
    if (activeId) {
      pollRef.current = setInterval(() => pollSession(activeId, false), 2000);
      pollSession(activeId, true);
    }
    return () => { if (pollRef.current) clearInterval(pollRef.current); };
  }, [activeId]);

  const showToast = (msg) => setToast(msg);

  // ── SSE Streaming ──
  function connectStream(sid) {
    if (streamSourceRef.current) {
      streamSourceRef.current.close();
      streamSourceRef.current = null;
    }
    setStreamingContent('');
    setIsStreaming(true);

    const url = `/api/sessions/${sid}/stream`;
    const headers = authToken ? { Authorization: `Bearer ${authToken}` } : {};
    // Use fetch-based SSE since EventSource doesn't support custom headers
    let cancelled = false;
    const reader = (async () => {
      try {
        const resp = await fetch(url, { headers });
        if (!resp.ok || !resp.body) { setIsStreaming(false); return; }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (!cancelled) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const evt = JSON.parse(line.slice(6));
                if (evt.type === 'text') {
                  setStreamingContent(prev => prev + evt.content + '\n\n');
                } else if (evt.type === 'done') {
                  setIsStreaming(false);
                  cancelled = true;
                } else if (evt.type === 'error') {
                  setStreamingContent(prev => prev + `\n错误: ${evt.message}\n`);
                  setIsStreaming(false);
                  cancelled = true;
                }
              } catch {}
            }
          }
        }
      } catch {
        // Stream error or disconnected
      }
      setIsStreaming(false);
      // Refresh to get persisted messages
      if (sid === activeId) {
        setTimeout(() => pollSession(sid, false), 500);
      }
    })();

    streamSourceRef.current = { close: () => { cancelled = true; } };
  }

  function disconnectStream() {
    if (streamSourceRef.current) {
      streamSourceRef.current.close();
      streamSourceRef.current = null;
    }
    setIsStreaming(false);
    setStreamingContent('');
  }

  // Connect stream when active session is processing
  useEffect(() => {
    if (activeId && isProcessing && !streamSourceRef.current) {
      connectStream(activeId);
    }
    if (!isProcessing && streamSourceRef.current) {
      disconnectStream();
    }
    return () => {};
  }, [activeId, isProcessing]);

  // Cleanup stream on session change
  useEffect(() => {
    return () => {
      if (streamSourceRef.current) {
        streamSourceRef.current.close();
        streamSourceRef.current = null;
      }
    };
  }, []);

  function resolveSessionFromList(list, options = {}) {
    const requestedID = getSessionIdFromUrl();
    const hasRequested = requestedID && list.some((s) => s.id === requestedID);
    const hasActive = activeId && list.some((s) => s.id === activeId);

    if (options.forceRequested && hasRequested) {
      return requestedID;
    }

    if (hasActive) return activeId;
    if (hasRequested) return requestedID;
    return list[0]?.id || null;
  }

  function syncActiveSessionFromList(list) {
    const nextId = resolveSessionFromList(list);
    if (nextId !== activeId) {
      setActiveId(nextId);
      setSessionIdToUrl(nextId);
    }
  }

  async function refreshSessions() {
    if (dragRef.current.isDragging) return;
    try {
      const data = await api('/api/sessions');
      setSessions(data.sessions || []);
      setActiveProcessors(data.activeProcessors || 0);
      syncActiveSessionFromList(data.sessions || []);
      if (initialLoadRef.current) {
        const urlId = getSessionIdFromUrl();
        if (urlId) setSessionSearchValue(urlId);
        initialLoadRef.current = false;
      }
    } catch (e) { showToast(e.message); }
  }

  async function loadCollections() {
    try {
      const data = await api('/api/collections');
      setCollections(data.collections || []);
    } catch {}
  }

  async function pollSession(sid, initialLoad = false) {
    try {
      const data = await api(`/api/sessions/${sid}`);
      const s = data.session;
      const nowBusy = s.isProcessing || s.queueLength > 0;
      const wasBusy = isProcessing;
      setMessages(s.messages || []);
      setIsProcessing(nowBusy);
      setSessions(prev => prev.map(x => x.id === sid ? { ...x, ...s } : x));

      // Also refresh session list for concurrency bar (skip during drag)
      if (!suppressPollRef.current) {
        const listData = await api('/api/sessions');
        setSessions(listData.sessions || []);
        setActiveProcessors(listData.activeProcessors || 0);
      }

      const justCompleted = wasBusy && !nowBusy;
      await loadFilesForSession(sid, justCompleted || initialLoad);
    } catch {}
  }

  async function loadFilesForSession(sid, autoPreview = true) {
    try {
      const data = await api(`/api/sessions/${sid}/files`);
      const newFiles = data.files || [];
      const prevNames = new Set(files.map(f => f.path));
      setFiles(newFiles);
      if (autoPreview) {
        const htmlFiles = newFiles.filter(f => isHtml(getFileDisplayName(f)));
        const newHtml = htmlFiles.find(f => !prevNames.has(f.path));
        if (newHtml) {
          setSelectedFile(newHtml);
          setPreviewPath(newHtml.path);
          setRightTab('preview');
          try {
            const fc = await api(`/api/sessions/${sid}/files/content?path=${encodeURIComponent(newHtml.path)}`);
            setFileContent(fc.content || '');
          } catch {}
        }
      }
    } catch {}
  }

  async function createSession() {
    try {
      const data = await api('/api/sessions', {
        method: 'POST',
        body: JSON.stringify({ model: config.defaultModel }),
      });
      setSessions(prev => [data.session, ...prev]);
      setActiveId(data.session.id);
      setSessionIdToUrl(data.session.id);
      setMessages([]);
      setFiles([]);
      setSelectedFile(null);
      setFileContent('');
      setPreviewPath('');
      showToast('新会话已创建');
    } catch (e) { showToast(e.message); }
  }

  async function deleteSession(sid) {
    if (!confirm('确认归档该会话？')) return;
    try {
      await api(`/api/sessions/${sid}`, { method: 'DELETE' });
      setSessions(prev => prev.filter(s => s.id !== sid));
      if (activeId === sid) {
        const remaining = sessions.filter(s => s.id !== sid);
        const nextId = remaining[0]?.id || null;
        setActiveId(nextId);
        setSessionIdToUrl(nextId);
        setMessages([]); setFiles([]); setSelectedFile(null);
      }
      showToast('已归档');
    } catch (e) { showToast(e.message); }
  }

  function selectSession(sid) {
    setActiveId(sid);
    setSessionIdToUrl(sid);
    setSelectedFile(null); setFileContent(''); setPreviewPath('');
    disconnectStream();
    const s = sessions.find(x => x.id === sid);
    if (s?.model) setCurrentModel(s.model);
  }

  // ── Pin / Collection / Rename / Drag handlers ──
  async function handlePinToggle(sid) {
    const s = sessions.find(x => x.id === sid);
    if (!s) return;
    const newPinned = !s.pinned;
    setSessions(prev => prev.map(x => x.id === sid ? { ...x, pinned: newPinned } : x));
    try {
      await api(`/api/sessions/${sid}`, { method: 'PATCH', body: JSON.stringify({ pinned: newPinned }) });
      await refreshSessions();
    } catch (e) { showToast(e.message); await refreshSessions(); }
  }

  async function handleMoveToCollection(sid, collectionId) {
    setSessions(prev => prev.map(x => x.id === sid ? { ...x, collectionId, pinned: false } : x));
    try {
      await api(`/api/sessions/${sid}`, { method: 'PATCH', body: JSON.stringify({ collection_id: collectionId, pinned: false }) });
      await refreshSessions();
      await loadCollections();
    } catch (e) { showToast(e.message); await refreshSessions(); }
  }

  function handleRenameSession(sid) {
    const s = sessions.find(x => x.id === sid);
    setRenamingSessionId(sid);
    setRenameValue(s?.title || '');
  }

  async function handleRenameSubmit(sid) {
    const newTitle = renameValue.trim();
    if (!newTitle) { setRenamingSessionId(null); return; }
    setSessions(prev => prev.map(x => x.id === sid ? { ...x, title: newTitle } : x));
    setRenamingSessionId(null);
    try {
      await api(`/api/sessions/${sid}`, { method: 'PATCH', body: JSON.stringify({ title: newTitle }) });
    } catch (e) { showToast(e.message); }
  }

  async function handleCreateCollection(forSessionId) {
    const name = prompt('请输入集合名称：');
    if (!name || !name.trim()) return;
    try {
      const data = await api('/api/collections', { method: 'POST', body: JSON.stringify({ name: name.trim() }) });
      await loadCollections();
      showToast(`集合 "${data.collection.name}" 已创建`);
      if (forSessionId) {
        await handleMoveToCollection(forSessionId, data.collection.id);
      }
    } catch (e) { showToast(e.message); }
  }

  async function handleDeleteCollection(collId) {
    if (!confirm('确认删除该集合？会话将移回"未分组"。')) return;
    try {
      await api(`/api/collections/${collId}`, { method: 'DELETE' });
      await loadCollections();
      await refreshSessions();
      showToast('集合已删除');
    } catch (e) { showToast(e.message); }
  }

  function handleRenameCollection(collId) {
    const c = collections.find(x => x.id === collId);
    setRenamingCollectionId(collId);
    setCollectionRenameValue(c?.name || '');
  }

  async function handleCollectionRenameSubmit(collId) {
    const name = collectionRenameValue.trim();
    if (!name) { setRenamingCollectionId(null); return; }
    setRenamingCollectionId(null);
    try {
      await api(`/api/collections/${collId}`, { method: 'PATCH', body: JSON.stringify({ name }) });
      await loadCollections();
    } catch (e) { showToast(e.message); }
  }

  async function handleExportSession(sid) {
    try {
      const data = await api(`/api/sessions/${sid}`);
      const s = data.session;
      const msgs = (s.messages || []).filter(m => m.role !== 'system');
      const lines = msgs.map(m => {
        const role = m.role === 'user' ? '用户' : '助手';
        const time = m.created_at ? `[${new Date(m.created_at).toLocaleString('zh-CN')}]` : '';
        return `${time} ${role}:\n${m.content}\n`;
      });
      const text = `# ${s.title || '会话记录'}\n导出时间: ${new Date().toLocaleString('zh-CN')}\n\n---\n\n${lines.join('\n---\n\n')}`;
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${(s.title || 'session').replace(/[\\/:*?"<>|]/g, '_')}.md`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('对话记录已导出');
    } catch (e) { showToast(e.message); }
  }

  function handleSessionMenuClick(e, sid) {
    const btn = e.currentTarget;
    const rect = btn.getBoundingClientRect();
    setContextMenu({ x: rect.right + 4, y: rect.top, sessionId: sid });
  }

  function toggleCollapseCollection(collId) {
    setCollapsedCollections(prev => {
      const next = new Set(prev);
      if (next.has(collId)) next.delete(collId); else next.add(collId);
      return next;
    });
  }

  // ── Drag & Drop ──
  function handleDragStart(e, session) {
    dragRef.current = { isDragging: true, draggedId: session.id };
    suppressPollRef.current = true;
    setDraggingSessionId(session.id);
    e.dataTransfer.setData('text/plain', session.id);
    e.dataTransfer.effectAllowed = 'move';
  }

  function handleDragEnd() {
    dragRef.current = { isDragging: false, draggedId: null };
    suppressPollRef.current = false;
    setDraggingSessionId(null);
    setDragOverTarget(null);
    refreshSessions();
  }

  function handleDragOverSession(e, targetSession) {
    e.preventDefault();
    e.stopPropagation();
    if (dragRef.current.draggedId === targetSession.id) return;
    setDragOverTarget(targetSession.id);
  }

  function handleDropOnSession(e, targetSession) {
    e.preventDefault();
    e.stopPropagation();
    setDragOverTarget(null);
    const draggedId = dragRef.current.draggedId;
    if (!draggedId || draggedId === targetSession.id) return;
    // Reorder: move dragged session to target's position
    const currentList = [...sessions];
    const dragIdx = currentList.findIndex(s => s.id === draggedId);
    const targetIdx = currentList.findIndex(s => s.id === targetSession.id);
    if (dragIdx < 0 || targetIdx < 0) return;
    const [moved] = currentList.splice(dragIdx, 1);
    // If moving to a pinned session's section, pin the dragged session too
    if (targetSession.pinned && !moved.pinned) {
      moved.pinned = true;
      api(`/api/sessions/${draggedId}`, { method: 'PATCH', body: JSON.stringify({ pinned: true }) }).catch(() => {});
    }
    // If moving to a collection session, adopt its collection
    if (targetSession.collectionId && moved.collectionId !== targetSession.collectionId) {
      moved.collectionId = targetSession.collectionId;
      api(`/api/sessions/${draggedId}`, { method: 'PATCH', body: JSON.stringify({ collection_id: targetSession.collectionId, pinned: false }) }).catch(() => {});
    }
    currentList.splice(targetIdx, 0, moved);
    setSessions(currentList);
    const orderedIds = currentList.filter(s => s.pinned === targetSession.pinned && s.collectionId === targetSession.collectionId).map(s => s.id);
    api('/api/sessions/reorder', { method: 'PATCH', body: JSON.stringify({ orderedIds }) }).catch(() => {});
  }

  function handleDropOnSection(e, sectionType, collectionId) {
    e.preventDefault();
    e.stopPropagation();
    setDragOverTarget(null);
    const draggedId = dragRef.current.draggedId;
    if (!draggedId) return;
    if (sectionType === 'pinned') {
      handlePinToggle(draggedId);
    } else if (sectionType === 'collection') {
      handleMoveToCollection(draggedId, collectionId);
    } else if (sectionType === 'uncategorized') {
      const s = sessions.find(x => x.id === draggedId);
      if (s && (s.pinned || s.collectionId)) {
        setSessions(prev => prev.map(x => x.id === draggedId ? { ...x, pinned: false, collectionId: null } : x));
        api(`/api/sessions/${draggedId}`, { method: 'PATCH', body: JSON.stringify({ pinned: false, collection_id: null }) }).catch(() => {});
      }
    }
  }

  // ── Session Sections (computed) ──
  const sessionSections = useMemo(() => {
    const q = sessionSearchValue.trim().toLowerCase();
    const filtered = q ? sessions.filter(s =>
      (s.title || '').toLowerCase().includes(q) || s.id.toLowerCase().includes(q)
    ) : sessions;

    const pinned = filtered.filter(s => s.pinned);
    const uncategorized = filtered.filter(s => !s.pinned && !s.collectionId);
    const collectionGroups = collections.map(c => ({
      collection: c,
      sessions: filtered.filter(s => !s.pinned && s.collectionId === c.id),
    })).filter(g => g.sessions.length > 0 || !q);

    return { pinned, collectionGroups, uncategorized };
  }, [sessions, collections, sessionSearchValue]);

  async function sendMessage() {
    if (!activeId) return;
    const text = inputValue.trim();
    const hasFiles = pendingUploads.length > 0;
    if (!text && !hasFiles) return;

    setSending(true);
    try {
      let attachments = [];

      // Upload pending files first
      if (hasFiles) {
        const formData = new FormData();
        for (const pu of pendingUploads) formData.append('files', pu.file);
        const result = await apiUpload(`/api/sessions/${activeId}/upload`, formData);
        attachments = result.uploaded || [];
        setPendingUploads([]);
      }

      await api(`/api/sessions/${activeId}/messages`, {
        method: 'POST',
        body: JSON.stringify({
          content: text,
          model: currentModel,
          attachments: attachments.length > 0 ? attachments : undefined,
        }),
      });
      setInputValue('');
      // Start streaming connection immediately
      setStreamingContent('');
      setIsStreaming(true);
      connectStream(activeId);
      setTimeout(() => pollSession(activeId, false), 300);
    } catch (e) { showToast(e.message); }
    setSending(false);
  }

  // Stage files into the chat input as pending (for sending with message)
  function stageUploads(fileList) {
    if (!fileList || fileList.length === 0) return;
    const newFiles = Array.from(fileList).map(f => ({
      file: f,
      name: f.name,
      size: f.size,
      preview: isImage(f.name) ? URL.createObjectURL(f) : null,
    }));
    setPendingUploads(prev => [...prev, ...newFiles]);
  }

  function removePendingUpload(index) {
    setPendingUploads(prev => {
      const copy = [...prev];
      if (copy[index]?.preview) URL.revokeObjectURL(copy[index].preview);
      copy.splice(index, 1);
      return copy;
    });
  }

  // Reference a file path into the chat input
  function referenceFile(item) {
    const path = item.path || item.name || '';
    const tag = `@${path} `;
    const ta = textareaRef.current;
    if (ta) {
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const before = inputValue.slice(0, start);
      const after = inputValue.slice(end);
      const sep = before.length > 0 && !before.endsWith(' ') && !before.endsWith('\n') ? ' ' : '';
      const newVal = before + sep + tag + after;
      setInputValue(newVal);
      const cursorPos = start + sep.length + tag.length;
      requestAnimationFrame(() => { ta.focus(); ta.setSelectionRange(cursorPos, cursorPos); });
    } else {
      const sep = inputValue.length > 0 && !inputValue.endsWith(' ') && !inputValue.endsWith('\n') ? ' ' : '';
      setInputValue(prev => prev + sep + tag);
    }
    showToast(`已引用 ${getFileDisplayName(item)}`);
  }

  // Direct upload to sandbox (from sidebar)
  async function uploadDirect(fileList) {
    if (!activeId || !fileList || fileList.length === 0) return;
    const formData = new FormData();
    for (const f of fileList) formData.append('files', f);
    try {
      await apiUpload(`/api/sessions/${activeId}/upload`, formData);
      showToast(`${fileList.length} 个文件已上传到沙箱`);
      await loadFilesForSession(activeId, true);
    } catch (e) { showToast(e.message); }
  }

  async function openFile(item) {
    if (item.type !== 'file') return;
    const displayName = getFileDisplayName(item);
    setSelectedFile(item);
    try {
      if (isImage(displayName)) {
        // Images -> preview tab (show directly)
        setPreviewPath(item.path);
        setFileContent('');
        setRightTab('preview');
      } else if (isVideo(displayName)) {
        // Videos -> preview tab (HTML5 video player)
        setPreviewPath(item.path);
        setFileContent('');
        setRightTab('preview');
      } else if (isHyperframe(displayName)) {
        // Hyperframe -> preview tab (enhanced iframe)
        setPreviewPath(item.path);
        setFileContent('');
        setRightTab('preview');
      } else if (is3D(displayName)) {
        // 3D models -> preview tab (Three.js viewer)
        setPreviewPath(item.path);
        setFileContent('');
        setRightTab('preview');
      } else if (isHtml(displayName)) {
        // HTML -> preview tab (iframe)
        setPreviewPath(item.path);
        const data = await api(`/api/sessions/${activeId}/files/content?path=${encodeURIComponent(item.path)}`);
        setFileContent(data.content || '');
        setRightTab('preview');
      } else if (isText(displayName)) {
        // Text files -> preview tab (rendered text)
        const data = await api(`/api/sessions/${activeId}/files/content?path=${encodeURIComponent(item.path)}`);
        setFileContent(data.content || '');
        setPreviewPath(item.path);
        setRightTab('preview');
      } else {
        // Binary / unknown -> code tab (raw)
        const data = await api(`/api/sessions/${activeId}/files/content?path=${encodeURIComponent(item.path)}`);
        setFileContent(data.content || '');
        setRightTab('code');
      }
    } catch (e) { showToast(e.message); }
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Drag & drop - chat input stages files
  function handleDragOver(e) { e.preventDefault(); setDropActive(true); }
  function handleDragLeave(e) { e.preventDefault(); setDropActive(false); }
  function handleDrop(e) {
    e.preventDefault();
    setDropActive(false);
    if (e.dataTransfer.files.length > 0) stageUploads(e.dataTransfer.files);
  }
  // Sidebar drop uploads directly
  function handleSidebarDrop(e) {
    e.preventDefault();
    setDropActive(false);
    if (e.dataTransfer.files.length > 0) uploadDirect(e.dataTransfer.files);
  }

  const previewSrc = activeId && previewPath
    ? `/api/sessions/${activeId}/preview?path=${encodeURIComponent(previewPath)}&token=${authToken}`
    : '';
  const selectedFileDisplayName = getFileDisplayName(selectedFile);

  return (
    <div className="app-layout">
      {/* -- LEFT SIDEBAR -- */}
      <div className="sidebar" style={{ width: leftResize.width }}>
        <div className="sidebar-header">
          <div className="sidebar-logo">
            {Icons.logo}
            <h1>Codex Lab</h1>
            <span>v1.0</span>
          </div>
          <button className="new-session-btn" onClick={createSession}>
            {Icons.plus} 新建会话
          </button>
        </div>
        <div className="session-goto">
          <input
            value={sessionSearchValue}
            onChange={(e) => setSessionSearchValue(e.target.value)}
            placeholder="搜索会话（ID/标题）"
          />
          <button
            className={`clear-filter${sessionSearchValue ? ' visible' : ''}`}
            onClick={() => setSessionSearchValue('')}
            title="清除筛选"
          >&times;</button>
        </div>
        <div className="session-list">
          {sessions.length === 0 && (
            <div style={{ padding: '20px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
              暂无会话
            </div>
          )}

          {/* Pinned section */}
          {sessionSections.pinned.length > 0 && (
            <>
              <div
                className={`section-header ${dragOverTarget === 'section:pinned' ? 'drop-target' : ''}`}
                onDragOver={(e) => { e.preventDefault(); setDragOverTarget('section:pinned'); }}
                onDragLeave={() => setDragOverTarget(null)}
                onDrop={(e) => handleDropOnSection(e, 'pinned')}
              >
                📌 已置顶 <span className="section-count">{sessionSections.pinned.length}</span>
              </div>
              {sessionSections.pinned.map(s => (
                <SessionItem
                  key={s.id} session={s}
                  isActive={s.id === activeId}
                  isDragging={draggingSessionId === s.id}
                  isDragOver={dragOverTarget === s.id}
                  isRenaming={renamingSessionId === s.id}
                  renameValue={renameValue}
                  onRenameChange={(e) => setRenameValue(e.target.value)}
                  onRenameSubmit={() => handleRenameSubmit(s.id)}
                  onRenameCancel={() => setRenamingSessionId(null)}
                  onSelect={() => selectSession(s.id)}
                  onDelete={() => deleteSession(s.id)}
                  onPinToggle={() => handlePinToggle(s.id)}
                  onMenuClick={(e) => handleSessionMenuClick(e, s.id)}
                  onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); setContextMenu({ x: e.clientX, y: e.clientY, sessionId: s.id }); }}
                  onDragStart={(e) => handleDragStart(e, s)}
                  onDragEnd={handleDragEnd}
                  onDragOverItem={(e) => handleDragOverSession(e, s)}
                  onDragOver={(e) => handleDropOnSession(e, s)}
                />
              ))}
            </>
          )}

          {/* Collection groups */}
          {sessionSections.collectionGroups.map(({ collection, sessions: collSessions }) => (
            <div className="collection-section" key={collection.id}>
              <div
                className={`collection-header ${dragOverTarget === 'collection:' + collection.id ? 'drop-target' : ''}`}
                onClick={() => { if (renamingCollectionId !== collection.id) toggleCollapseCollection(collection.id); }}
                onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); setContextMenu({ x: e.clientX, y: e.clientY, collectionId: collection.id }); }}
                onDragOver={(e) => { e.preventDefault(); setDragOverTarget('collection:' + collection.id); }}
                onDragLeave={() => setDragOverTarget(null)}
                onDrop={(e) => handleDropOnSection(e, 'collection', collection.id)}
              >
                <span className={`chevron ${!collapsedCollections.has(collection.id) ? 'expanded' : ''}`}>▶</span>
                {renamingCollectionId === collection.id ? (
                  <input
                    className="coll-name-input"
                    value={collectionRenameValue}
                    onChange={(e) => setCollectionRenameValue(e.target.value)}
                    onKeyDown={(e) => { if (e.key === 'Enter') handleCollectionRenameSubmit(collection.id); else if (e.key === 'Escape') setRenamingCollectionId(null); e.stopPropagation(); }}
                    onClick={(e) => e.stopPropagation()}
                    onBlur={() => handleCollectionRenameSubmit(collection.id)}
                    autoFocus
                  />
                ) : (
                  <span className="coll-name">{collection.name}</span>
                )}
                <span className="coll-count">{collSessions.length}</span>
                <button className="coll-menu-btn" onClick={(e) => { e.stopPropagation(); e.preventDefault(); const rect = e.currentTarget.getBoundingClientRect(); setContextMenu({ x: rect.right + 4, y: rect.top, collectionId: collection.id }); }} title="更多操作">⋮</button>
              </div>
              {!collapsedCollections.has(collection.id) && (
                <div className="collection-body">
                  {collSessions.map(s => (
                    <SessionItem
                      key={s.id} session={s}
                      isActive={s.id === activeId}
                      isDragging={draggingSessionId === s.id}
                      isDragOver={dragOverTarget === s.id}
                      isRenaming={renamingSessionId === s.id}
                      renameValue={renameValue}
                      onRenameChange={(e) => setRenameValue(e.target.value)}
                      onRenameSubmit={() => handleRenameSubmit(s.id)}
                      onRenameCancel={() => setRenamingSessionId(null)}
                      onSelect={() => selectSession(s.id)}
                      onDelete={() => deleteSession(s.id)}
                      onPinToggle={() => handlePinToggle(s.id)}
                      onMenuClick={(e) => handleSessionMenuClick(e, s.id)}
                      onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); setContextMenu({ x: e.clientX, y: e.clientY, sessionId: s.id }); }}
                      onDragStart={(e) => handleDragStart(e, s)}
                      onDragEnd={handleDragEnd}
                      onDragOverItem={(e) => handleDragOverSession(e, s)}
                      onDragOver={(e) => handleDropOnSession(e, s)}
                    />
                  ))}
                </div>
              )}
            </div>
          ))}

          {/* Uncategorized section */}
          {sessionSections.uncategorized.length > 0 && (
            <>
              <div
                className={`section-header ${dragOverTarget === 'section:uncategorized' ? 'drop-target' : ''}`}
                onDragOver={(e) => { e.preventDefault(); setDragOverTarget('section:uncategorized'); }}
                onDragLeave={() => setDragOverTarget(null)}
                onDrop={(e) => handleDropOnSection(e, 'uncategorized')}
              >
                💬 会话 <span className="section-count">{sessionSections.uncategorized.length}</span>
              </div>
              {sessionSections.uncategorized.map(s => (
                <SessionItem
                  key={s.id} session={s}
                  isActive={s.id === activeId}
                  isDragging={draggingSessionId === s.id}
                  isDragOver={dragOverTarget === s.id}
                  isRenaming={renamingSessionId === s.id}
                  renameValue={renameValue}
                  onRenameChange={(e) => setRenameValue(e.target.value)}
                  onRenameSubmit={() => handleRenameSubmit(s.id)}
                  onRenameCancel={() => setRenamingSessionId(null)}
                  onSelect={() => selectSession(s.id)}
                  onDelete={() => deleteSession(s.id)}
                  onPinToggle={() => handlePinToggle(s.id)}
                  onMenuClick={(e) => handleSessionMenuClick(e, s.id)}
                  onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); setContextMenu({ x: e.clientX, y: e.clientY, sessionId: s.id }); }}
                  onDragStart={(e) => handleDragStart(e, s)}
                  onDragEnd={handleDragEnd}
                  onDragOverItem={(e) => handleDragOverSession(e, s)}
                  onDragOver={(e) => handleDropOnSession(e, s)}
                />
              ))}
            </>
          )}

          {/* No results message */}
          {sessions.length > 0 && sessionSections.pinned.length === 0 && sessionSections.uncategorized.length === 0 && sessionSections.collectionGroups.every(g => g.sessions.length === 0) && (
            <div style={{ padding: '20px', textAlign: 'center', color: 'var(--text-muted)', fontSize: '13px' }}>
              无匹配会话
            </div>
          )}

          {/* Create collection button */}
          {sessions.length > 0 && (
            <button className="create-collection-btn" onClick={() => handleCreateCollection(null)}>
              ➕ 新建集合
            </button>
          )}
        </div>

        {/* Context Menu Portal */}
        {contextMenu && contextMenu.sessionId && (() => {
          const s = sessions.find(x => x.id === contextMenu.sessionId);
          return (
            <ContextMenu
              x={contextMenu.x} y={contextMenu.y}
              sessionId={contextMenu.sessionId}
              sessionPinned={s?.pinned || false}
              collections={collections}
              onClose={() => setContextMenu(null)}
              onPin={handlePinToggle}
              onMoveToCollection={handleMoveToCollection}
              onRename={handleRenameSession}
              onDelete={deleteSession}
              onCreateCollection={handleCreateCollection}
              onExport={handleExportSession}
            />
          );
        })()}
        {contextMenu && contextMenu.collectionId && (
          <div>
            <div className="context-menu-backdrop" onClick={() => setContextMenu(null)} onContextMenu={e => { e.preventDefault(); setContextMenu(null); }} />
            <div className="context-menu" style={{ left: contextMenu.x, top: contextMenu.y }}>
              <div className="context-menu-item" onClick={() => { handleRenameCollection(contextMenu.collectionId); setContextMenu(null); }}>
                <span>✏️</span><span>重命名集合</span>
              </div>
              <div className="context-menu-item danger" onClick={() => { handleDeleteCollection(contextMenu.collectionId); setContextMenu(null); }}>
                <span>🗑️</span><span>删除集合</span>
              </div>
            </div>
          </div>
        )}
        <ConcurrencyBar active={activeProcessors} max={config.maxConcurrentSessions || 4} />
        <div className="user-bar">
          <div className="user-avatar">{(user.display_name || user.email || 'U').charAt(0).toUpperCase()}</div>
          <div className="user-info">
            <div className="user-name">{user.display_name || 'User'}</div>
            <div className="user-email">{user.email}</div>
          </div>
          <button className="logout-btn" onClick={onLogout} title="退出登录">
            {Icons.logout}
          </button>
        </div>
      </div>

      {/* Left resize handle */}
      <div className="resize-handle" onMouseDown={leftResize.onMouseDown}></div>

      {/* -- MAIN CHAT AREA -- */}
      <div className="main-area">
        <div className="chat-panel">
          {activeId ? (
            <>
              <div className="chat-header">
                <div className="title">
                  <span className={`dot ${isProcessing ? 'busy' : 'idle'}`}></span>
                  {activeSession?.title || '会话'}
                </div>
              </div>

              <div className="chat-messages" ref={chatContainerRef} onScroll={handleChatScroll} style={{position:'relative'}}>
                {messages.filter(m => m.role !== 'system').map((msg, i) => (
                  <ChatMessage key={msg.id || i} msg={msg} />
                ))}
                {isStreaming && streamingContent && (
                  <div className="message assistant">
                    <div className="avatar">C</div>
                    <div className="bubble">
                      <div className="bubble-header">
                        Codex
                        <span className="streaming-badge"><span className="pulse-dot"></span> 生成中</span>
                      </div>
                      <div className="bubble-content" dangerouslySetInnerHTML={{ __html: renderMd(streamingContent) + '<span class="streaming-cursor"></span>' }}></div>
                    </div>
                  </div>
                )}
                {isStreaming && !streamingContent && (
                  <div className="message assistant">
                    <div className="avatar">C</div>
                    <div className="bubble">
                      <div className="bubble-header">
                        Codex
                        <span className="streaming-badge"><span className="pulse-dot"></span> 思考中</span>
                      </div>
                      <div className="bubble-content" style={{color:'var(--text-muted)',fontSize:'13px'}}>
                        <span className="streaming-cursor"></span>
                      </div>
                    </div>
                  </div>
                )}
                <div ref={chatEndRef}></div>
                {userScrolledUp && (
                  <button className="scroll-bottom-btn" onClick={scrollToBottom}>
                    ↓ 新消息
                  </button>
                )}
              </div>

              <div className="chat-input-area">
                <div
                  className="chat-input-wrap"
                  onDragOver={handleDragOver}
                  onDragLeave={handleDragLeave}
                  onDrop={handleDrop}
                  style={dropActive ? { borderColor: 'var(--accent)', background: 'rgba(59,130,246,0.03)' } : {}}
                >
                  {pendingUploads.length > 0 && (
                    <div className="pending-uploads">
                      {pendingUploads.map((pu, i) => (
                        <div className="file-chip" key={i}>
                          {pu.preview ? (
                            <img className="chip-icon" src={pu.preview} alt="" />
                          ) : (
                            <span className="chip-icon" style={{background:'var(--bg-hover)',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:4}}>{Icons.file}</span>
                          )}
                          <span className="chip-name">{pu.name}</span>
                          <button className="chip-remove" onClick={() => removePendingUpload(i)} title="移除">×</button>
                        </div>
                      ))}
                    </div>
                  )}
                  <textarea
                    ref={textareaRef}
                    value={inputValue}
                    onChange={e => setInputValue(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder={pendingUploads.length > 0 ? "添加说明后发送，或直接发送文件... Enter 发送" : "输入消息... Enter 发送，Shift+Enter 换行。拖拽文件到此处。"}
                    rows={1}
                  />
                  <div className="chat-input-toolbar">
                    <div className="actions" style={{display:'flex',alignItems:'center',gap:'8px',flex:1}}>
                      <input
                        ref={fileInputRef}
                        type="file"
                        multiple
                        style={{ display: 'none' }}
                        onChange={e => { stageUploads(e.target.files); e.target.value = ''; }}
                      />
                      <button className="upload-btn" onClick={() => fileInputRef.current?.click()} style={{padding:'5px 8px'}} title="上传文件">
                        {Icons.upload}
                      </button>
                      <div className="model-select-chip">
                        <select value={currentModel} onChange={e => setCurrentModel(e.target.value)}>
                          {MODEL_OPTIONS.map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                      </div>
                      <span className="hints" style={{marginLeft:'auto'}}>
                        {isProcessing ? '正在处理中..' : ''}
                        {pendingUploads.length > 0 ? `${pendingUploads.length} 个文件待发送` : ''}
                      </span>
                    </div>
                    <button className="send-circle" onClick={sendMessage} disabled={(!inputValue.trim() && pendingUploads.length === 0) || sending} title="发送">
                      <svg viewBox="0 0 16 16" fill="none"><path d="M8 12V3M4 7l4-4 4 4" stroke="#09090b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            </>
          ) : (
            <div className="empty-state">
              {Icons.code}
              <h3>Codex Lab</h3>
              <p>你的 AI 编程助手平台。点击左侧「新建会话」开始与 Codex 对话，可以上传文件、预览生成的 HTML。</p>
              <button className="send-btn primary" onClick={createSession} style={{ marginTop: '8px' }}>
                {Icons.plus} 创建第一个会话
              </button>
            </div>
          )}
        </div>

        {/* Right resize handle */}
        <div className="resize-handle" onMouseDown={rightResize.onMouseDown}></div>

        {/* -- RIGHT PANEL -- */}
        <div className="right-panel" style={{ width: rightResize.width }}>
          <div className="panel-tabs">
            <button className={`panel-tab ${rightTab === 'files' ? 'active' : ''}`} onClick={() => setRightTab('files')}>
              文件 ({files.length})
            </button>
            <button className={`panel-tab ${rightTab === 'code' ? 'active' : ''}`} onClick={() => setRightTab('code')}>
              代码
            </button>
            <button className={`panel-tab ${rightTab === 'preview' ? 'active' : ''}`} onClick={() => setRightTab('preview')}>
              预览
            </button>
          </div>
          <div className="panel-content">
            {rightTab === 'files' && (
              <div className="file-tree">
                <div className="file-tree-header">
                  <span style={{ fontSize: '11px', color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>Sandbox Files</span>
                  <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                    <div className="view-toggle">
                      <button className={fileViewMode === 'list' ? 'active' : ''} onClick={() => setFileViewMode('list')} title="列表">≡</button>
                      <button className={fileViewMode === 'grid' ? 'active' : ''} onClick={() => setFileViewMode('grid')} title="网格">▦</button>
                    </div>
                    <button style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', padding: '2px' }} onClick={() => fileInputRef.current?.click()} title="上传文件">
                      {Icons.upload}
                    </button>
                    <button style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', padding: '2px' }} onClick={() => activeId && loadFilesForSession(activeId)}>
                      {Icons.refresh}
                    </button>
                  </div>
                </div>

                <div
                  className={`dropzone ${dropActive ? 'dragover' : ''}`}
                  onDragOver={handleDragOver}
                  onDragLeave={handleDragLeave}
                  onDrop={handleSidebarDrop}
                  onClick={() => fileInputRef.current?.click()}
                >
                  {Icons.upload}<br/>
                  拖拽文件到此处 或 点击上传
                </div>

                {files.length === 0 ? (
                  <div className="file-tree-empty">沙箱中暂无文件<br/><span style={{fontSize:'11px'}}>让 Codex 生成一些文件试试</span></div>
                ) : fileViewMode === 'list' ? (
                  files.map((item, i) => (
                    <FileTreeItem
                      key={i}
                      item={item}
                      isActive={selectedFile?.path === item.path}
                      onClick={() => openFile(item)}
                      onReference={referenceFile}
                    />
                  ))
                ) : (
                  <div className="file-grid">
                    {files.filter(f => f.type === 'file').map((item, i) => {
                      const displayName = getFileDisplayName(item);
                      const imgSrc = isImage(displayName) && activeId
                        ? `/api/sessions/${activeId}/preview?path=${encodeURIComponent(item.path)}&token=${authToken}`
                        : null;
                      const size = item.size > 1024 ? `${(item.size/1024).toFixed(1)}KB` : `${item.size}B`;
                      return (
                        <div
                          key={i}
                          className={`file-grid-item ${selectedFile?.path === item.path ? 'active' : ''}`}
                          onClick={() => openFile(item)}
                        >
                          <button className="ref-btn" onClick={(e) => { e.stopPropagation(); referenceFile(item); }} title="引用到输入框">@</button>
                          <div className="grid-thumb">
                            {imgSrc ? <img src={imgSrc} alt={displayName} /> : (
                              <span>{isHyperframe(displayName) ? '🎨' : isVideo(displayName) ? '🎬' : is3D(displayName) ? '🧊' : isHtml(displayName) ? '🌐' : isText(displayName) ? '📄' : '📦'}</span>
                            )}
                          </div>
                          <span className="grid-name" title={displayName}>{displayName}</span>
                          <span className="grid-size">{size}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {rightTab === 'code' && (
              <div className="code-viewer">
                {selectedFile ? (
                  <>
                    <div className="code-viewer-header">
                      <span className="filename">{selectedFileDisplayName}</span>
                      <div style={{display:'flex',gap:'4px'}}>
                        {isPreviewable(selectedFileDisplayName) && (
                          <button className="send-btn secondary" style={{padding:'4px 8px',fontSize:'11px'}} onClick={() => { setPreviewPath(selectedFile.path); setRightTab('preview'); }}>
                            {Icons.eye} 预览
                          </button>
                        )}
                      </div>
                    </div>
                    <div className="code-viewer-body">
                      <pre>{fileContent}</pre>
                    </div>
                  </>
                ) : (
                  <div className="code-viewer-empty">选择左侧文件查看代码</div>
                )}
              </div>
            )}

            {rightTab === 'preview' && (
              <div className="preview-area">
                {previewPath && activeId ? (
                  <>
                    <div className="preview-toolbar">
                      <span style={{color:'var(--green)',fontSize:'11px'}}>{isHyperframe(selectedFileDisplayName) ? 'HF' : isVideo(selectedFileDisplayName) ? 'VIDEO' : is3D(selectedFileDisplayName) ? '3D' : isHtml(selectedFileDisplayName) ? 'LIVE' : isImage(selectedFileDisplayName) ? 'IMG' : 'TEXT'}</span>
                      <span className="url-bar">{previewPath}</span>
                      {!isImage(selectedFileDisplayName) && !is3D(selectedFileDisplayName) && !isVideo(selectedFileDisplayName) && !isHyperframe(selectedFileDisplayName) && isText(selectedFileDisplayName) && (
                        <button className="send-btn secondary" style={{padding:'4px 8px',fontSize:'11px'}} onClick={() => setRightTab('code')}>
                          {'</>'} 代码
                        </button>
                      )}
                    </div>
                    {isHyperframe(selectedFileDisplayName) ? (
                      <div className="preview-hyperframe-wrap">
                        <div className="hyperframe-toolbar">
                          <span className="hf-badge">HYPERFRAME</span>
                          <span className="hf-url">{previewPath}</span>
                          <button onClick={() => window.open(previewSrc, '_blank')} title="在新窗口打开">↗</button>
                        </div>
                        <div className="hyperframe-body">
                          <iframe src={previewSrc} title="Hyperframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-presentation allow-downloads"></iframe>
                        </div>
                      </div>
                    ) : isVideo(selectedFileDisplayName) ? (
                      <div className="preview-video-wrap">
                        <video src={previewSrc} controls autoPlay loop></video>
                      </div>
                    ) : isImage(selectedFileDisplayName) ? (
                      <div className="preview-image-wrap">
                        <img src={previewSrc} alt={selectedFileDisplayName} />
                      </div>
                    ) : is3D(selectedFileDisplayName) ? (
                      <div className="preview-frame-wrap">
                        <iframe src={`/3d-viewer.html?url=${encodeURIComponent(previewSrc)}&name=${encodeURIComponent(selectedFileDisplayName)}`} title="3D Viewer" sandbox="allow-scripts allow-same-origin"></iframe>
                      </div>
                    ) : isHtml(selectedFileDisplayName) ? (
                      <div className="preview-frame-wrap">
                        <iframe src={previewSrc} title="Preview" sandbox="allow-scripts allow-same-origin"></iframe>
                      </div>
                    ) : (
                      <div className="preview-text-wrap">{fileContent}</div>
                    )}
                  </>
                ) : (
                  <div className="preview-empty">
                    {Icons.eye}
                    <span>点击文件可预览</span>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {toast && <Toast message={toast} onClose={() => setToast(null)} />}
    </div>
  );
}

/* ====== ROOT APP ====== */
function RootApp() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [showAuth, setShowAuth] = useState(false);

  useEffect(() => {
    if (authToken) {
      api('/api/auth/me')
        .then(data => { setUser(data.user); setChecking(false); })
        .catch(() => { setAuth(''); setChecking(false); });
    } else {
      setChecking(false);
    }
  }, []);

  if (checking) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'var(--bg-deep)' }}>
        <span className="spinner" style={{ width: 32, height: 32, borderWidth: 3 }}></span>
      </div>
    );
  }

  if (!user) {
    if (showAuth) {
      return <AuthPage onLogin={(u) => setUser(u)} onBack={() => setShowAuth(false)} />;
    }
    return <LandingPage onLogin={(u) => setUser(u)} onShowAuth={() => setShowAuth(true)} />;
  }

  return <MainApp user={user} onLogout={() => { setAuth(''); setUser(null); }} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<RootApp />);
</script>
</body>
</html>
